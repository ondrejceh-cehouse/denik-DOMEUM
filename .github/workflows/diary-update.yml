name: 🏗️ Stavební deník – Automatický zápis

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pouze výpis, bez zápisu do domeum)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-diary:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🎭 Install Playwright Chromium
        run: |
          pip install playwright
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2

      - name: 🏗️ Run diary update
        env:
          DOMEUM_EMAIL:                ${{ secrets.DOMEUM_EMAIL }}
          DOMEUM_PASSWORD:             ${{ secrets.DOMEUM_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID:      ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DRY_RUN:                     ${{ github.event.inputs.dry_run || 'false' }}
        run: python src/main.py

      - name: 💾 Uložení stavu zpracovaných fotek
        if: always()
        run: |
          git config --local user.email "diary-bot@github.com"
          git config --local user.name "Stavební Deník Bot"
          git add data/processed_photos.json
          git diff --staged --quiet || git commit -m "🤖 Update stav [skip ci]"
          git push || echo "Žádné změny"

      - name: 📸 Debug screenshoty
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/domeum_debug_*.png
          retention-days: 7
          if-no-files-found: ignore
